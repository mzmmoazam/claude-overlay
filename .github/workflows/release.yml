name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        run: |
          sudo apt-get update && sudo apt-get install -y bats
          bats test/

      - name: Create tarball
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          OUTDIR="$(mktemp -d)"
          tar -czf "${OUTDIR}/claude-overlay-${VERSION}.tar.gz" \
            --exclude='.github' \
            --exclude='test' \
            --exclude='.git' \
            --exclude='__pycache__' \
            --transform "s|^\./|claude-overlay-${VERSION}/|" \
            .
          sha256sum "${OUTDIR}/claude-overlay-${VERSION}.tar.gz" > "${OUTDIR}/claude-overlay-${VERSION}.tar.gz.sha256"
          mv "${OUTDIR}"/claude-overlay-* .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            claude-overlay-*.tar.gz
            claude-overlay-*.tar.gz.sha256

      - name: Update Homebrew tap
        if: env.TAP_TOKEN
        env:
          TAP_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHA256=$(sha256sum "claude-overlay-${VERSION}.tar.gz" | awk '{print $1}')

          git clone "https://x-access-token:${TAP_TOKEN}@github.com/mzmmoazam/homebrew-claude-overlay.git" tap
          cd tap

          sed -i "s|version \".*\"|version \"${VERSION}\"|" Formula/claude-overlay.rb
          sed -i "s|sha256 \".*\"|sha256 \"${SHA256}\"|" Formula/claude-overlay.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/claude-overlay.rb
          git commit -m "Update claude-overlay to ${VERSION}"
          git push
