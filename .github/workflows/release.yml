name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        run: |
          sudo apt-get update && sudo apt-get install -y bats
          bats test/

      - name: Create tarball
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          tar -czf "claude-overlay-${VERSION}.tar.gz" \
            --exclude='.github' \
            --exclude='test' \
            --exclude='.git' \
            -s "/^./claude-overlay-${VERSION}/" \
            .
          sha256sum "claude-overlay-${VERSION}.tar.gz" > "claude-overlay-${VERSION}.tar.gz.sha256"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            claude-overlay-*.tar.gz
            claude-overlay-*.tar.gz.sha256
